<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Portfolio | Planner</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="page">
      <section class="card">
        <h2>Academic Planner</h2>
        <p>Add your study tasks and manage them easily.</p>
        <form id="task-form" class="task-form">
          <input id="task-input" type="text" placeholder="Enter a task" />
          <button type="submit">Add Task</button>
        </form>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Daniella Uzozie. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
